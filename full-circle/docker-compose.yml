# Full Circle — multi-stage kill chain capture runtime (SFRS-compliant).
# 3 servicios: target (servidor con recon + login + export sensible), attacker
# (ejecuta el kill chain completo) y sniffer. El sniffer comparte el netns del
# target y escribe ./pcaps/kill-chain.pcap.
services:
  target:
    image: ghcr.io/bitsofalber/full-circle-target:latest
    container_name: ${LAB_ID:-full-circle}-target
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 4s
      timeout: 3s
      retries: 10
    networks: [labnet]

  sniffer:
    image: ghcr.io/bitsofalber/full-circle-sniffer:latest
    container_name: ${LAB_ID:-full-circle}-sniffer
    network_mode: "service:target"
    volumes:
      - ./pcaps:/pcaps
    healthcheck:
      test: ["CMD-SHELL", "test -f /pcaps/kill-chain.pcap"]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      - target

  attacker:
    image: ghcr.io/bitsofalber/full-circle-attacker:latest
    container_name: ${LAB_ID:-full-circle}-attacker
    environment:
      - TARGET=target
      - START_DELAY=${START_DELAY:-6}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/session_done"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      - target
      - sniffer
    networks: [labnet]

networks:
  labnet:
    name: ${LAB_ID:-full-circle}-net
