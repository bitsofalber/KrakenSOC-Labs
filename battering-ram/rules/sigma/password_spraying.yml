title: Password Spraying — Single Source Against Many Accounts
id: 3e7b1c40-2a9d-4f88-9c1b-batteringram01
status: experimental
description: >
  Detecta password spraying: una misma IP origen provoca fallos de inicio de
  sesión (4625) contra un número elevado de cuentas distintas en poco tiempo
  (MITRE ATT&CK T1110.003).
references:
  - https://attack.mitre.org/techniques/T1110/003/
author: KrakenSOC
date: 2026/07/08
logsource:
  product: windows
  service: security
detection:
  selection:
    EventCode: 4625
  timeframe: 15m
  condition: selection | count(Account_Name) by Source_Network_Address > 10
fields:
  - Source_Network_Address
  - Account_Name
falsepositives:
  - Servidores de aplicaciones o proxies con credenciales caducadas que reintentan
level: high
tags:
  - attack.credential_access
  - attack.t1110.003
