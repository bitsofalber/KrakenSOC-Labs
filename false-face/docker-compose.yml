# False Face — ARP spoofing / MITM capture runtime (SFRS-compliant).
# 4 servicios: gateway (portal HTTP en claro suplantado), victim (navega al
# gateway), attacker (envenena la cache ARP) y sniffer (captura ARP + HTTP). El
# sniffer comparte el netns del gateway y escribe ./pcaps/arp-mitm.pcap.
services:
  gateway:
    image: ghcr.io/bitsofalber/false-face-gateway:latest
    container_name: ${LAB_ID:-false-face}-gateway
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 4s
      timeout: 3s
      retries: 10
    networks: [labnet]

  sniffer:
    image: ghcr.io/bitsofalber/false-face-sniffer:latest
    container_name: ${LAB_ID:-false-face}-sniffer
    network_mode: "service:gateway"
    volumes:
      - ./pcaps:/pcaps
    healthcheck:
      test: ["CMD-SHELL", "test -f /pcaps/arp-mitm.pcap"]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      - gateway

  attacker:
    image: ghcr.io/bitsofalber/false-face-attacker:latest
    container_name: ${LAB_ID:-false-face}-attacker
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - GATEWAY=gateway
      - START_DELAY=${START_DELAY:-6}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/session_done"]
      interval: 5s
      timeout: 3s
      retries: 24
    depends_on:
      - gateway
      - sniffer
    networks: [labnet]

  victim:
    image: ghcr.io/bitsofalber/false-face-victim:latest
    container_name: ${LAB_ID:-false-face}-victim
    environment:
      - GATEWAY=gateway
      - START_DELAY=${START_DELAY_VICTIM:-9}
    depends_on:
      - gateway
      - sniffer
    networks: [labnet]

networks:
  labnet:
    name: ${LAB_ID:-false-face}-net
