# Dead Drop — cleartext FTP credential + file exfiltration runtime (SFRS-compliant).
# 3 servicios: ftp-server (FTP legacy en claro con el fichero sensible),
# workstation (la cuenta que inicia sesion y descarga el fichero) y sniffer
# (captura). El sniffer comparte el netns del ftp-server para ver TODO el
# trafico (canal de control 21 + canal de datos pasivo) y escribe la captura en
# ./pcaps/ftp-cleartext.pcap (la evidencia del alumno).
#
# El ALUMNO hace PULL de imagenes ya construidas en GHCR (manifest multi-arch).
# Para construir en local (mantenedores):
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build

services:
  ftp-server:
    image: ghcr.io/bitsofalber/dead-drop-ftp-server:latest
    container_name: ${LAB_ID:-dead-drop}-ftp-server
    environment:
      - FTP_USER=${FTP_USER:-svc_fileshare}
      - FTP_PASS=${FTP_PASS:-Rw-Fileshare-2026}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost',21),2)"]
      interval: 4s
      timeout: 3s
      retries: 10
    networks: [labnet]

  sniffer:
    image: ghcr.io/bitsofalber/dead-drop-sniffer:latest
    container_name: ${LAB_ID:-dead-drop}-sniffer
    network_mode: "service:ftp-server"
    volumes:
      - ./pcaps:/pcaps
    healthcheck:
      test: ["CMD-SHELL", "test -f /pcaps/ftp-cleartext.pcap"]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      - ftp-server

  workstation:
    image: ghcr.io/bitsofalber/dead-drop-workstation:latest
    container_name: ${LAB_ID:-dead-drop}-workstation
    environment:
      - FTP_HOST=ftp-server
      - FTP_USER=${FTP_USER:-svc_fileshare}
      - FTP_PASS=${FTP_PASS:-Rw-Fileshare-2026}
      - START_DELAY=${START_DELAY:-6}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/session_done"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      - ftp-server
      - sniffer
    networks: [labnet]

networks:
  labnet:
    name: ${LAB_ID:-dead-drop}-net
