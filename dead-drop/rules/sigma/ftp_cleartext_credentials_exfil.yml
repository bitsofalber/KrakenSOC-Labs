title: Cleartext FTP Credentials and File Exfiltration
id: 92b92087-5e0a-4698-9069-5ed6180d0f96
status: experimental
description: >
  Detecta el uso de FTP sin cifrar: envio de credenciales en claro (comando PASS)
  y descarga de ficheros sensibles (RETR de un .csv) sobre el canal de control FTP.
  El protocolo sin cifrar expone credenciales y datos a quien capture la red
  (MITRE ATT&CK T1040 / T1048.003).
references:
  - https://attack.mitre.org/techniques/T1040/
  - https://attack.mitre.org/techniques/T1048/003/
author: KrakenSOC
date: 2026/07/10
logsource:
  category: application
  product: ftp
detection:
  selection_pass:
    ftp.command: 'PASS'
  selection_retr:
    ftp.command: 'RETR'
    ftp.arg|endswith: '.csv'
  condition: selection_pass or selection_retr
falsepositives:
  - Uso legitimo de FTP interno (se recomienda migrar a SFTP/FTPS)
level: high
tags:
  - attack.credential_access
  - attack.t1040
  - attack.exfiltration
  - attack.t1048.003
