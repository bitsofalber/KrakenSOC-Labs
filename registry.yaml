# KrakenSOC Runtime Labs — official registry.
# Machine-readable index consumed by KrakenSOC (the SaaS) and the `forge` CLI.
#
# Topology: monorepo. Every lab is a self-contained directory inside this repo.
# `path` is the lab folder; the SaaS reads each lab's manifest.yaml from there.
# `status`: available | planned. Keep entries alphabetical.
spec_version: "1.0.0"
repo: https://github.com/bitsofalber/KrakenSOC-Labs

labs:
  - id: silent-harvest
    status: available
    path: ./silent-harvest
    title: "Silent Harvest"
    difficulty: intermediate
    categories: ["Network Forensics"]

  - id: apt29-midnight-blizzard
    status: planned
    path: ./apt29-midnight-blizzard
  - id: operation-black-quill
    status: planned
    path: ./operation-black-quill
  - id: operation-iron-gate
    status: planned
    path: ./operation-iron-gate
  - id: operation-kerberos
    status: planned
    path: ./operation-kerberos
  - id: operation-lockbit
    status: planned
    path: ./operation-lockbit
  - id: operation-root-shadow
    status: planned
    path: ./operation-root-shadow
  - id: phantom-storm
    status: planned
    path: ./phantom-storm
  - id: unauthorized-horizon
    status: planned
    path: ./unauthorized-horizon
