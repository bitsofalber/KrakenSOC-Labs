title: Cloud Instance Metadata Service Access (SSRF)
id: nimbus-imds-ssrf
status: experimental
description: Peticiones a 169.254.169.254/latest/meta-data/iam/security-credentials — robo del rol de la instancia.
logsource: { category: proxy }
detection:
  selection:
    dest_ip: '169.254.169.254'
    uri|contains: '/latest/meta-data/iam/security-credentials'
  condition: selection
level: high
tags: [attack.credential_access, attack.t1552.005]
