# Override de mantenedor: construye las imágenes en local en vez de hacer pull.
# Uso: docker compose -f docker-compose.yml -f docker-compose.build.yml build
# (En local, la víctima usa el DECOY de runtime/victim/seed/, no la flag real.)
services:
  resolver:
    build: ./runtime/resolver
  sniffer:
    build: ./runtime/sniffer
  victim:
    build: ./runtime/victim
