# Open Line — cleartext Telnet admin session capture runtime (SFRS-compliant).
# 3 servicios: telnetd (router legacy por Telnet en claro), workstation (el
# operador que inicia sesion y vuelca la config) y sniffer (captura). El sniffer
# comparte el netns del telnetd y escribe la captura en ./pcaps/telnet-cleartext.pcap.
services:
  telnetd:
    image: ghcr.io/bitsofalber/open-line-telnetd:latest
    container_name: ${LAB_ID:-open-line}-telnetd
    environment:
      - TELNET_USER=${TELNET_USER:-netops}
      - TELNET_PASS=${TELNET_PASS:-NetOps-2026-RtrAdmin}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost',23),2)"]
      interval: 4s
      timeout: 3s
      retries: 10
    networks: [labnet]

  sniffer:
    image: ghcr.io/bitsofalber/open-line-sniffer:latest
    container_name: ${LAB_ID:-open-line}-sniffer
    network_mode: "service:telnetd"
    volumes:
      - ./pcaps:/pcaps
    healthcheck:
      test: ["CMD-SHELL", "test -f /pcaps/telnet-cleartext.pcap"]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      - telnetd

  workstation:
    image: ghcr.io/bitsofalber/open-line-workstation:latest
    container_name: ${LAB_ID:-open-line}-workstation
    environment:
      - TELNET_HOST=telnetd
      - TELNET_USER=${TELNET_USER:-netops}
      - TELNET_PASS=${TELNET_PASS:-NetOps-2026-RtrAdmin}
      - START_DELAY=${START_DELAY:-6}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/session_done"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      - telnetd
      - sniffer
    networks: [labnet]

networks:
  labnet:
    name: ${LAB_ID:-open-line}-net
