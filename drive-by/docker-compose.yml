# Drive By — cleartext HTTP malware download capture runtime (SFRS-compliant).
# 3 servicios: webserver (sitio de descargas malicioso en claro), workstation
# (el empleado que descarga el binario) y sniffer (captura). El sniffer comparte
# el netns del webserver y escribe la captura en ./pcaps/http-malware.pcap.
services:
  webserver:
    image: ghcr.io/bitsofalber/drive-by-webserver:latest
    container_name: ${LAB_ID:-drive-by}-webserver
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 4s
      timeout: 3s
      retries: 10
    networks: [labnet]

  sniffer:
    image: ghcr.io/bitsofalber/drive-by-sniffer:latest
    container_name: ${LAB_ID:-drive-by}-sniffer
    network_mode: "service:webserver"
    volumes:
      - ./pcaps:/pcaps
    healthcheck:
      test: ["CMD-SHELL", "test -f /pcaps/http-malware.pcap"]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      - webserver

  workstation:
    image: ghcr.io/bitsofalber/drive-by-workstation:latest
    container_name: ${LAB_ID:-drive-by}-workstation
    environment:
      - WEB_HOST=webserver
      - START_DELAY=${START_DELAY:-6}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/session_done"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      - webserver
      - sniffer
    networks: [labnet]

networks:
  labnet:
    name: ${LAB_ID:-drive-by}-net
