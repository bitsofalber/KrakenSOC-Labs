title: Cleartext Credentials Submitted Over HTTP POST
id: 2b8e5d10-4c1f-4a9b-9c7e-plainsight0001
status: experimental
description: >
  Detecta el envío de credenciales en claro: un POST HTTP (sin TLS) a un
  endpoint de login cuyo cuerpo contiene parámetros de usuario y contraseña.
  Los protocolos sin cifrar exponen las credenciales a cualquiera que capture
  la red (MITRE ATT&CK T1040).
references:
  - https://attack.mitre.org/techniques/T1040/
  - https://attack.mitre.org/techniques/T1071/001/
author: KrakenSOC
date: 2026/07/08
logsource:
  category: proxy
detection:
  selection_method:
    cs-method: 'POST'
  selection_login_uri:
    cs-uri-stem|endswith: '/login'
  selection_form_body:
    cs-body|contains|all:
      - 'username='
      - 'password='
  condition: selection_method and selection_login_uri and selection_form_body
fields:
  - c-ip
  - cs-uri-stem
  - cs-username
falsepositives:
  - Aplicaciones internas legacy que aún no han migrado a HTTPS (el hallazgo real)
level: high
tags:
  - attack.credential_access
  - attack.t1040
  - attack.command_and_control
  - attack.t1071.001
