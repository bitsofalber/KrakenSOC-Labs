# Plain Sight — cleartext HTTP credential capture runtime (SFRS-compliant).
# 3 servicios: portal (app web legacy en claro), workstation (el empleado que
# hace login) y sniffer (captura). El sniffer comparte el netns del portal para
# ver TODO el HTTP entrante y escribe la captura en ./pcaps/cleartext-http.pcap
# (la evidencia del alumno).
#
# El ALUMNO hace PULL de imágenes ya construidas en GHCR (manifest multi-arch:
# linux/amd64 + linux/arm64) — no necesita compilar nada. Para construir en
# local (mantenedores), usa el override:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build

services:
  portal:
    image: ghcr.io/bitsofalber/plain-sight-portal:latest
    container_name: ${LAB_ID:-plain-sight}-portal
    environment:
      - PORTAL_USER=${PORTAL_USER:-s.buchanan}
      - PORTAL_PASS=${PORTAL_PASS:-S@lesManager2026}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 4s
      timeout: 3s
      retries: 10
    networks: [labnet]

  sniffer:
    image: ghcr.io/bitsofalber/plain-sight-sniffer:latest
    container_name: ${LAB_ID:-plain-sight}-sniffer
    # Comparte la pila de red del portal: tcpdump ve todo el HTTP que le llega.
    network_mode: "service:portal"
    volumes:
      - ./pcaps:/pcaps
    healthcheck:
      test: ["CMD-SHELL", "test -f /pcaps/cleartext-http.pcap"]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      - portal

  workstation:
    image: ghcr.io/bitsofalber/plain-sight-workstation:latest
    container_name: ${LAB_ID:-plain-sight}-workstation
    environment:
      - PORTAL_HOST=portal
      - PORTAL_USER=${PORTAL_USER:-s.buchanan}
      - PORTAL_PASS=${PORTAL_PASS:-S@lesManager2026}
      - START_DELAY=${START_DELAY:-6}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/session_done"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      - portal
      - sniffer
    networks: [labnet]

networks:
  labnet:
    name: ${LAB_ID:-plain-sight}-net
