# Doorknock — Nmap port scan capture runtime (SFRS-compliant).
# 3 servicios: target (servidor con varios puertos abiertos; el 8080 filtra una
# service-key), attacker (lanza el escaneo Nmap) y sniffer (captura). El sniffer
# comparte el netns del target y escribe la captura en ./pcaps/nmap-scan.pcap.
services:
  target:
    image: ghcr.io/bitsofalber/doorknock-target:latest
    container_name: ${LAB_ID:-doorknock}-target
    networks: [labnet]

  sniffer:
    image: ghcr.io/bitsofalber/doorknock-sniffer:latest
    container_name: ${LAB_ID:-doorknock}-sniffer
    network_mode: "service:target"
    volumes:
      - ./pcaps:/pcaps
    healthcheck:
      test: ["CMD-SHELL", "test -f /pcaps/nmap-scan.pcap"]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      - target

  attacker:
    image: ghcr.io/bitsofalber/doorknock-attacker:latest
    container_name: ${LAB_ID:-doorknock}-attacker
    environment:
      - TARGET=target
      - START_DELAY=${START_DELAY:-6}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/session_done"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      - target
      - sniffer
    networks: [labnet]

networks:
  labnet:
    name: ${LAB_ID:-doorknock}-net
