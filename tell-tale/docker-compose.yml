# Tell Tale — TLS JA3 fingerprint + cert analysis runtime (SFRS-compliant).
# 3 servicios: c2server (TLS con la flag en el Subject del cert), implant (beacon
# con JA3 distintivo) y sniffer. El sniffer comparte el netns del c2server y
# escribe ./pcaps/tls-ja3.pcap.
services:
  c2server:
    image: ghcr.io/bitsofalber/tell-tale-c2server:latest
    container_name: ${LAB_ID:-tell-tale}-c2server
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost',443),2)\""]
      interval: 4s
      timeout: 3s
      retries: 10
    networks: [labnet]

  sniffer:
    image: ghcr.io/bitsofalber/tell-tale-sniffer:latest
    container_name: ${LAB_ID:-tell-tale}-sniffer
    network_mode: "service:c2server"
    volumes:
      - ./pcaps:/pcaps
    healthcheck:
      test: ["CMD-SHELL", "test -f /pcaps/tls-ja3.pcap"]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      - c2server

  implant:
    image: ghcr.io/bitsofalber/tell-tale-implant:latest
    container_name: ${LAB_ID:-tell-tale}-implant
    environment:
      - C2_HOST=c2server
      - START_DELAY=${START_DELAY:-6}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/session_done"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      - c2server
      - sniffer
    networks: [labnet]

networks:
  labnet:
    name: ${LAB_ID:-tell-tale}-net
