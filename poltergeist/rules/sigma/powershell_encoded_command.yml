title: Encoded PowerShell Command Execution
id: 8d2f4a10-9c3b-4e77-b1a6-poltergeist01
status: experimental
description: >
  Detecta la ejecución de PowerShell con un comando codificado en base64
  (-EncodedCommand / -enc), una técnica habitual de ofuscación para evadir
  detección (MITRE ATT&CK T1027 / T1059.001).
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/
author: KrakenSOC
date: 2026/07/08
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith: '\powershell.exe'
  selection_enc:
    CommandLine|contains:
      - '-EncodedCommand'
      - '-enc '
  condition: selection_img and selection_enc
fields:
  - Computer
  - User
  - ParentImage
  - CommandLine
falsepositives:
  - Scripts de administración legítimos que usan -EncodedCommand (raros; revisar)
level: high
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
