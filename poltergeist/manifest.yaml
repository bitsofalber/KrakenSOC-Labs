# SFRS manifest — Poltergeist. Validado contra ../schema/manifest.schema.json.
# Lab de clase "interactive" (SFRS §11): expone Splunk Web. SOLO amd64 (Splunk).
spec_version: "1.0.0"

id: poltergeist
title: "Poltergeist"
version: "1.0.0"
difficulty: intermediate
estimated_duration: 60
author: "KrakenSOC"
license: "MIT"

skills:
  - "SIEM"
  - "Splunk"
  - "SPL"
  - "Threat Hunting"
  - "Detection Engineering"
  - "PowerShell Analysis"
categories:
  - "SIEM / Threat Hunting"
tags:
  - "splunk"
  - "spl"
  - "powershell"
  - "threat-hunting"
  - "detection-engineering"
  - "northwind"

mitre:
  tactics:
    - "TA0002 Execution"
    - "TA0005 Defense Evasion"
    - "TA0006 Credential Access"
    - "TA0003 Persistence"
  techniques:
    - "T1059.001"    # PowerShell
    - "T1027"        # Obfuscated Files or Information
    - "T1105"        # Ingress Tool Transfer
    - "T1562.001"    # Impair Defenses: Disable or Modify Tools
    - "T1070.001"    # Indicator Removal: Clear Windows Event Logs
    - "T1003"        # OS Credential Dumping
    - "T1547.001"    # Registry Run Keys / Startup Folder

attack_chain:
  - "Documentos de Office maliciosos lanzan PowerShell en varios endpoints de Northwind."
  - "El atacante usa comandos codificados (-EncodedCommand), download cradles (IEX/IWR/BITS) y ejecución con ventana oculta."
  - "Desactiva el antivirus (Set-MpPreference), vuelca credenciales (Invoke-Mimikatz) y crea persistencia y cuentas."
  - "Borra los registros de eventos (wevtutil / Clear-EventLog) para cubrir sus huellas."

runtime:
  containers:
    - name: splunk
      image: "splunk/splunk:9.3.2"
      role: "siem"
      healthcheck: true
    - name: forge
      image: "ghcr.io/bitsofalber/poltergeist-forge"
      role: "data-generator"
      healthcheck: true
  ports:
    - "8000:8000"
  # SOLO amd64: la imagen de Splunk no existe en ARM (SFRS §11). En ARM corre
  # emulada (best-effort, no soportado).
  supported_platforms:
    - "linux/amd64"
  docker_images:
    - "splunk/splunk:9.3.2"
    - "python:3.12-slim"
  minimum_requirements:
    ram_mb: 4096
    disk_mb: 8192
    cpus: 2

ioc:
  - type: domain
    value: "cdn-edge-sync.net"
    note: "Dominio del download cradle principal."
  - type: domain
    value: "update-svc-cdn.net"
    note: "Descarga de dropper / BITS."
  - type: technique
    value: "T1070.001"
    note: "Borrado de logs (wevtutil / Clear-EventLog)."
telemetry:
  - "Sysmon (EventID 1 process, EventID 3 network)"
  - "PowerShell Script Block Logging (EventID 4104)"
evidence:
  - "siem"

questions:
  - id: "Q1"
    title: "¿Cuántos eventos usan -EncodedCommand?"
  - id: "Q2"
    title: "¿Qué host concentra más actividad maliciosa (paciente cero)?"
  - id: "Q3"
    title: "¿Qué dominio usa el download cradle principal?"
  - id: "Q4"
    title: "¿Qué cmdlet desactiva el antivirus?"
  - id: "Q5"
    title: "¿Qué técnica MITRE corresponde al borrado de logs?"
  - id: "Q6"
    title: "¿Qué usuario ejecutó Invoke-Mimikatz?"
  - id: "Q7"
    title: "¿Cuántos eventos fueron bloqueados (Blocked)?"
  - id: "Q8"
    title: "Recupera la flag del -EncodedCommand ofuscado."
flags:
  count: 1

resources:
  knowledge_guides:
    - "PowerShell Attack Detection"
    - "SPL Fundamentals"
  academy_modules:
    - "SIEM & Detection Engineering"
  operations: []
  investigations: []
  career_paths:
    - "SOC Analyst L1 → L2"
  certifications:
    - "Splunk Core Certified User"
  external:
    - "https://attack.mitre.org/techniques/T1059/001/"
    - "https://attack.mitre.org/techniques/T1027/"

required_tools:
  - "Docker"
  - "Docker Compose v2"
  - "Un navegador web (para Splunk Web)"
