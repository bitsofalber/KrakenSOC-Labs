# SFRS §7 — Build custom lab images multi-arch (amd64 + arm64) and push to GHCR.
# Runs on a version tag (vX.Y.Z). Only needed if the lab builds custom images
# under runtime/. Labs that use only public multi-arch base images can delete
# the build matrix and keep just the release job.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    # Descubre Dockerfiles bajo runtime/. Si no hay, el job no hace nada.
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (emulación multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch images
        run: |
          shopt -s nullglob
          found=0
          for df in runtime/*/Dockerfile runtime/Dockerfile; do
            [ -f "$df" ] || continue
            found=1
            ctx=$(dirname "$df")
            svc=$(basename "$ctx")
            [ "$svc" = "runtime" ] && svc="app"
            img="ghcr.io/${GITHUB_REPOSITORY,,}/${svc}"
            echo ">>> $img  (context: $ctx)"
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              -t "${img}:${GITHUB_REF_NAME}" \
              -t "${img}:latest" \
              --push "$ctx"
          done
          [ "$found" = 0 ] && echo "No hay Dockerfiles en runtime/; el lab usa imágenes base multi-arch. Nada que construir."

  release:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
