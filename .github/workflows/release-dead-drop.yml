# Publica las imagenes de dead-drop en GHCR como manifests MULTI-ARCH
# (linux/amd64 + linux/arm64). El token real (con la flag) se inyecta desde el
# secret DEAD_DROP_TOKEN SOLO en el build del ftp-server, asi nunca vive en el
# repositorio en claro (en el repo solo hay un decoy).
#
# Dispara con un tag 'dead-drop-v*' o manualmente (workflow_dispatch).
name: release-dead-drop

on:
  push:
    tags: ["dead-drop-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ftp-server, workstation, sniffer]
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar token real (solo ftp-server) desde el secret
        if: matrix.service == 'ftp-server'
        run: |
          printf '%s\n' "${{ secrets.DEAD_DROP_TOKEN }}" \
            > dead-drop/runtime/ftp-server/seed/export_token.txt
          echo "Token real inyectado (solo en este runner, no se commitea)."

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: dead-drop/runtime/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/bitsofalber/dead-drop-${{ matrix.service }}:latest
            ghcr.io/bitsofalber/dead-drop-${{ matrix.service }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/bitsofalber/KrakenSOC-Labs
            org.opencontainers.image.description=KrakenSOC Runtime Lab — Dead Drop (${{ matrix.service }})
