# Publica las imagenes de relay-race en GHCR como manifests MULTI-ARCH
# (linux/amd64 + linux/arm64). El token real (con la flag) se inyecta desde el
# secret RELAY_RACE_TOKEN SOLO en el build del smbserver, asi nunca vive en el
# repositorio en claro (en el repo solo hay un decoy).
#
# Dispara con un tag 'relay-race-v*' o manualmente (workflow_dispatch).
name: release-relay-race

on:
  push:
    tags: ["relay-race-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [smbserver, client, sniffer]
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar token real (solo smbserver) desde el secret
        if: matrix.service == 'smbserver'
        run: |
          printf '%s\n' "${{ secrets.RELAY_RACE_TOKEN }}" \
            > relay-race/runtime/smbserver/seed/share_token.txt
          echo "Token real inyectado (solo en este runner, no se commitea)."

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: relay-race/runtime/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/bitsofalber/relay-race-${{ matrix.service }}:latest
            ghcr.io/bitsofalber/relay-race-${{ matrix.service }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/bitsofalber/KrakenSOC-Labs
            org.opencontainers.image.description=KrakenSOC Runtime Lab — Relay Race (${{ matrix.service }})
