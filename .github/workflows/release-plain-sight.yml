# Publica las imágenes de plain-sight en GHCR como manifests MULTI-ARCH
# (linux/amd64 + linux/arm64). El token real (con la flag) se inyecta desde el
# secret PLAIN_SIGHT_TOKEN SOLO en el build del portal, así nunca vive en el
# repositorio en claro (en el repo solo hay un decoy).
#
# Dispara con un tag 'plain-sight-v*' o manualmente (workflow_dispatch).
name: release-plain-sight

on:
  push:
    tags: ["plain-sight-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [portal, workstation, sniffer]
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar token real (solo portal) desde el secret
        if: matrix.service == 'portal'
        run: |
          printf '%s\n' "${{ secrets.PLAIN_SIGHT_TOKEN }}" \
            > plain-sight/runtime/portal/seed/auth_token.txt
          echo "Token real inyectado (no se commitea, solo existe en este runner)."

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: plain-sight/runtime/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/bitsofalber/plain-sight-${{ matrix.service }}:latest
            ghcr.io/bitsofalber/plain-sight-${{ matrix.service }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/bitsofalber/KrakenSOC-Labs
            org.opencontainers.image.description=KrakenSOC Runtime Lab — Plain Sight (${{ matrix.service }})
