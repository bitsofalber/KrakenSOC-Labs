# Publica las imagenes de full-circle en GHCR como manifests MULTI-ARCH
# (linux/amd64 + linux/arm64). El token real (con la flag) se inyecta desde el
# secret FULL_CIRCLE_TOKEN SOLO en el build del target, asi nunca vive en el
# repositorio en claro (en el repo solo hay un decoy).
#
# Dispara con un tag 'full-circle-v*' o manualmente (workflow_dispatch).
name: release-full-circle

on:
  push:
    tags: ["full-circle-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [target, attacker, sniffer]
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar token real (solo target) desde el secret
        if: matrix.service == 'target'
        run: |
          printf '%s\n' "${{ secrets.FULL_CIRCLE_TOKEN }}" \
            > full-circle/runtime/target/seed/export_token.txt
          echo "Token real inyectado (solo en este runner, no se commitea)."

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: full-circle/runtime/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/bitsofalber/full-circle-${{ matrix.service }}:latest
            ghcr.io/bitsofalber/full-circle-${{ matrix.service }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/bitsofalber/KrakenSOC-Labs
            org.opencontainers.image.description=KrakenSOC Runtime Lab — Full Circle (${{ matrix.service }})
