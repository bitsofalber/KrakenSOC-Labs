# Publica las imagenes de heartbeat en GHCR (multi-arch). El token real (con la
# flag) se inyecta desde el secret HEARTBEAT_TOKEN SOLO en el build del
# attacker (que construye el adjunto del correo), asi nunca vive en el repo.
name: release-heartbeat

on:
  push:
    tags: ["heartbeat-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [host, attacker, sniffer]
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar token real (solo attacker) desde el secret
        if: matrix.service == 'attacker'
        run: |
          printf '%s\n' "${{ secrets.HEARTBEAT_TOKEN }}" \
            > heartbeat/runtime/attacker/seed/exfil_token.txt
          echo "Token real inyectado (solo en este runner, no se commitea)."

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: heartbeat/runtime/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/bitsofalber/heartbeat-${{ matrix.service }}:latest
            ghcr.io/bitsofalber/heartbeat-${{ matrix.service }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/bitsofalber/KrakenSOC-Labs
            org.opencontainers.image.description=KrakenSOC Runtime Lab — Heartbeat (${{ matrix.service }})
