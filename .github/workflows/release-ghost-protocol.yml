# Publica las imágenes de ghost-protocol en GHCR como manifests MULTI-ARCH
# (linux/amd64 + linux/arm64). El dataset real (con la flag) se inyecta desde el
# secret GHOST_PROTOCOL_TOKEN SOLO en el build del implante (la víctima), así
# nunca vive en el repositorio en claro (en el repo solo hay un decoy).
#
# Dispara con un tag 'ghost-protocol-v*' o manualmente (workflow_dispatch).
name: release-ghost-protocol

on:
  push:
    tags: ["ghost-protocol-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [c2, implant, sniffer]
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar dataset real (solo implante) desde el secret
        if: matrix.service == 'implant'
        run: |
          printf '%s' "${{ secrets.GHOST_PROTOCOL_TOKEN }}" | base64 -d \
            > ghost-protocol/runtime/implant/seed/northwind_customers.csv
          echo "Dataset real inyectado (no se commitea, solo existe en este runner)."

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: ghost-protocol/runtime/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/bitsofalber/ghost-protocol-${{ matrix.service }}:latest
            ghcr.io/bitsofalber/ghost-protocol-${{ matrix.service }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/bitsofalber/KrakenSOC-Labs
            org.opencontainers.image.description=KrakenSOC Runtime Lab — Ghost Protocol (${{ matrix.service }})
