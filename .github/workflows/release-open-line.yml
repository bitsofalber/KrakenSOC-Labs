# Publica las imagenes de open-line en GHCR como manifests MULTI-ARCH
# (linux/amd64 + linux/arm64). El token real (con la flag) se inyecta desde el
# secret OPEN_LINE_TOKEN SOLO en el build del telnetd, asi nunca vive en el
# repositorio en claro (en el repo solo hay un decoy).
#
# Dispara con un tag 'open-line-v*' o manualmente (workflow_dispatch).
name: release-open-line

on:
  push:
    tags: ["open-line-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [telnetd, workstation, sniffer]
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar token real (solo telnetd) desde el secret
        if: matrix.service == 'telnetd'
        run: |
          printf '%s\n' "${{ secrets.OPEN_LINE_TOKEN }}" \
            > open-line/runtime/telnetd/seed/service_key.txt
          echo "Token real inyectado (solo en este runner, no se commitea)."

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: open-line/runtime/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/bitsofalber/open-line-${{ matrix.service }}:latest
            ghcr.io/bitsofalber/open-line-${{ matrix.service }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/bitsofalber/KrakenSOC-Labs
            org.opencontainers.image.description=KrakenSOC Runtime Lab — Open Line (${{ matrix.service }})
