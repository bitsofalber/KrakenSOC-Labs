# Genera evidencia SINTETICA (.evtx) del lab Windows avanzado "dcsync" en un
# runner windows-latest. NO ejecuta ataques: solo escribe los registros de
# evento del incidente en un canal propio (cyber-range de logs). Benigno.
name: gen-win-dcsync

on:
  workflow_dispatch:
    inputs:
      flag:
        description: "Flag a embeber en la evidencia"
        required: false
        default: "NORTHWIND{dcsync_r3pl1c4t10n_4bus3}"

permissions:
  contents: read

jobs:
  generate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generar la evidencia (sintetica)
        shell: powershell
        env:
          SI_FLAG: ${{ github.event.inputs.flag }}
        run: |
          .\win-events\dcsync\generate.ps1 -OutDir "$env:GITHUB_WORKSPACE\evidence"

      - name: Exportar un timeline.csv (todos los .evtx)
        shell: powershell
        run: |
          $ev = @()
          Get-ChildItem "$env:GITHUB_WORKSPACE\evidence\*.evtx" | ForEach-Object {
            $name = $_.BaseName
            try {
              $ev += Get-WinEvent -Path $_.FullName -ErrorAction SilentlyContinue | ForEach-Object {
                [PSCustomObject]@{
                  TimeCreated = $_.TimeCreated.ToString("s")
                  Log         = $name
                  EventId     = $_.Id
                  Level       = $_.LevelDisplayName
                  Provider    = $_.ProviderName
                  Message     = ($_.Message -replace "`r`n"," " -replace ",",";")
                }
              }
            } catch {}
          }
          $ev | Sort-Object TimeCreated | Export-Csv -NoTypeInformation -Encoding UTF8 "$env:GITHUB_WORKSPACE\evidence\timeline.csv"
          Get-ChildItem "$env:GITHUB_WORKSPACE\evidence" | Format-Table Name, Length

      - name: Empaquetar el bundle
        shell: powershell
        run: |
          Compress-Archive -Path "$env:GITHUB_WORKSPACE\evidence\*" -DestinationPath "$env:GITHUB_WORKSPACE\dcsync-evidence.zip" -Force

      - name: Subir la evidencia como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: dcsync-evidence
          path: |
            evidence/*.evtx
            evidence/timeline.csv
            dcsync-evidence.zip
          retention-days: 7
