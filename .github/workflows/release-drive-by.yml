# Publica las imagenes de drive-by en GHCR como manifests MULTI-ARCH
# (linux/amd64 + linux/arm64). El token real (con la flag) se inyecta desde el
# secret DRIVE_BY_TOKEN SOLO en el build del webserver, asi nunca vive en el
# repositorio en claro (en el repo solo hay un decoy).
#
# Dispara con un tag 'drive-by-v*' o manualmente (workflow_dispatch).
name: release-drive-by

on:
  push:
    tags: ["drive-by-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [webserver, workstation, sniffer]
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar token real (solo webserver) desde el secret
        if: matrix.service == 'webserver'
        run: |
          printf '%s\n' "${{ secrets.DRIVE_BY_TOKEN }}" \
            > drive-by/runtime/webserver/seed/payload_token.txt
          echo "Token real inyectado (solo en este runner, no se commitea)."

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: drive-by/runtime/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/bitsofalber/drive-by-${{ matrix.service }}:latest
            ghcr.io/bitsofalber/drive-by-${{ matrix.service }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/bitsofalber/KrakenSOC-Labs
            org.opencontainers.image.description=KrakenSOC Runtime Lab — Drive By (${{ matrix.service }})
