# Genera la evidencia (.evtx) del lab Windows "phantom-sub" en un runner
# windows-latest y la sube como artefacto. La flag va DENTRO de los eventos.
# Se pasa por input (o por el secret $(echo phantom-sub | tr 'a-z-' 'A-Z_')_TOKEN si se define).
name: gen-win-phantom-sub

on:
  workflow_dispatch:
    inputs:
      flag:
        description: "Flag a embeber en la evidencia"
        required: false
        default: "NORTHWIND{wm1_3v3nt_subscr1pt10n_p3rs1st}"

permissions:
  contents: read

jobs:
  generate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generar la evidencia (escenario)
        shell: powershell
        env:
          SI_FLAG: ${{ github.event.inputs.flag }}
        run: |
          .\win-events\phantom-sub\generate.ps1 -OutDir "$env:GITHUB_WORKSPACE\evidence"

      - name: Exportar un timeline.csv (todos los .evtx de la evidencia)
        shell: powershell
        run: |
          $ev = @()
          Get-ChildItem "$env:GITHUB_WORKSPACE\evidence\*.evtx" | ForEach-Object {
            $name = $_.BaseName
            try {
              $ev += Get-WinEvent -Path $_.FullName -ErrorAction SilentlyContinue | ForEach-Object {
                [PSCustomObject]@{
                  TimeCreated = $_.TimeCreated.ToString("s")
                  Log         = $name
                  EventId     = $_.Id
                  Level       = $_.LevelDisplayName
                  Provider    = $_.ProviderName
                  Message     = ($_.Message -replace "`r`n"," " -replace ",",";")
                }
              }
            } catch {}
          }
          $ev | Sort-Object TimeCreated | Export-Csv -NoTypeInformation -Encoding UTF8 "$env:GITHUB_WORKSPACE\evidence\timeline.csv"
          Get-ChildItem "$env:GITHUB_WORKSPACE\evidence" | Format-Table Name, Length

      - name: Empaquetar el bundle
        shell: powershell
        run: |
          Compress-Archive -Path "$env:GITHUB_WORKSPACE\evidence\*" -DestinationPath "$env:GITHUB_WORKSPACE\phantom-sub-evidence.zip" -Force

      - name: Subir la evidencia como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: phantom-sub-evidence
          path: |
            evidence/*.evtx
            evidence/timeline.csv
            phantom-sub-evidence.zip
          retention-days: 7
