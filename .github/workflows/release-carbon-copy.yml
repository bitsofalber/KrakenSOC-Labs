# Publica las imagenes de carbon-copy en GHCR (multi-arch). El token real (con la
# flag) se inyecta desde el secret CARBON_COPY_TOKEN SOLO en el build del
# workstation (que construye el adjunto del correo), asi nunca vive en el repo.
name: release-carbon-copy

on:
  push:
    tags: ["carbon-copy-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [smtpd, workstation, sniffer]
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar token real (solo workstation) desde el secret
        if: matrix.service == 'workstation'
        run: |
          printf '%s\n' "${{ secrets.CARBON_COPY_TOKEN }}" \
            > carbon-copy/runtime/workstation/seed/mail_token.txt
          echo "Token real inyectado (solo en este runner, no se commitea)."

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: carbon-copy/runtime/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/bitsofalber/carbon-copy-${{ matrix.service }}:latest
            ghcr.io/bitsofalber/carbon-copy-${{ matrix.service }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/bitsofalber/KrakenSOC-Labs
            org.opencontainers.image.description=KrakenSOC Runtime Lab — Carbon Copy (${{ matrix.service }})
