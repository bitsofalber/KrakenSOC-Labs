# Publica las imagenes de false-face en GHCR (multi-arch). El token real (la
# flag) se inyecta desde el secret FALSE_FACE_TOKEN SOLO en el build del gateway.
name: release-false-face

on:
  push:
    tags: ["false-face-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, attacker, victim, sniffer]
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar token real (solo gateway) desde el secret
        if: matrix.service == 'gateway'
        run: |
          printf '%s\n' "${{ secrets.FALSE_FACE_TOKEN }}" \
            > false-face/runtime/gateway/seed/session_token.txt
          echo "Token real inyectado (solo en este runner, no se commitea)."

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: false-face/runtime/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/bitsofalber/false-face-${{ matrix.service }}:latest
            ghcr.io/bitsofalber/false-face-${{ matrix.service }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/bitsofalber/KrakenSOC-Labs
            org.opencontainers.image.description=KrakenSOC Runtime Lab — False Face (${{ matrix.service }})
