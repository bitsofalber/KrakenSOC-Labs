# Publica las imágenes de silent-harvest en GHCR como manifests MULTI-ARCH
# (linux/amd64 + linux/arm64). El payload real (con la flag) se inyecta desde
# el secret SILENT_HARVEST_PAYLOAD SOLO en el build de la víctima, así nunca
# vive en el repositorio en claro (en el repo solo hay un decoy).
#
# Dispara con un tag 'silent-harvest-v*' o manualmente (workflow_dispatch).
name: release-silent-harvest

on:
  push:
    tags: ["silent-harvest-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [resolver, victim, sniffer]
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar payload real (solo víctima) desde el secret
        if: matrix.service == 'victim'
        run: |
          echo "${{ secrets.SILENT_HARVEST_PAYLOAD }}" | base64 -d \
            > silent-harvest/runtime/victim/seed/northwind_payroll_Q3.csv
          echo "Payload real inyectado (no se commitea, solo existe en este runner)."

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: silent-harvest/runtime/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/bitsofalber/silent-harvest-${{ matrix.service }}:latest
            ghcr.io/bitsofalber/silent-harvest-${{ matrix.service }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/bitsofalber/KrakenSOC-Labs
            org.opencontainers.image.description=KrakenSOC Runtime Lab — Silent Harvest (${{ matrix.service }})
