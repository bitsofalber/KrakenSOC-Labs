lab: pilfer
questions:
  - id: Q1
    prompt: "¿Qué usuario conectó el USB y copió los ficheros (el insider)?"
    type: short_text
    points: 100
  - id: Q2
    prompt: "¿Qué letra de unidad tiene la unidad USB donde se copiaron los ficheros?"
    type: short_text
    points: 100
  - id: Q3
    prompt: "¿Cuántos ficheros se copiaron a la unidad USB?"
    type: number
    points: 100
  - id: Q4
    prompt: "¿Qué fichero MÁS sensible (nóminas) se robó?"
    type: short_text
    points: 100
  - id: Q5
    prompt: "¿En qué hostname ocurrió el robo?"
    type: short_text
    points: 100
  - id: Q6
    prompt: "¿Qué sub-técnica de MITRE ATT&CK describe la exfiltración por USB? (formato Txxxx.xxx)"
    type: short_text
    points: 100
  - id: Q7
    prompt: "¿Qué cmdlet de PowerShell usó para comprimir (estacionar) los datos antes de copiarlos?"
    type: short_text
    points: 100
  - id: Q8
    prompt: "Decodifica el -EncodedCommand que ejecutó el insider y recupera la flag (NORTHWIND{...})."
    type: flag
    points: 300
