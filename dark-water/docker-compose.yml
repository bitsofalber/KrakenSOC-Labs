# Dark Water — DNS-over-HTTPS (DoH) exfiltration capture runtime (SFRS-compliant).
# 3 servicios: doh-server (resolver DoH malicioso, TLS RSA descifrable), implant
# (exfiltra por consultas DoH) y sniffer. El sniffer comparte el netns del
# doh-server y escribe ./pcaps/doh-exfil.pcap. Clave para descifrar: resources/decrypt-me.key.
services:
  doh-server:
    image: ghcr.io/bitsofalber/dark-water-doh-server:latest
    container_name: ${LAB_ID:-dark-water}-doh-server
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost',443),2)\""]
      interval: 4s
      timeout: 3s
      retries: 10
    networks: [labnet]

  sniffer:
    image: ghcr.io/bitsofalber/dark-water-sniffer:latest
    container_name: ${LAB_ID:-dark-water}-sniffer
    network_mode: "service:doh-server"
    volumes:
      - ./pcaps:/pcaps
    healthcheck:
      test: ["CMD-SHELL", "test -f /pcaps/doh-exfil.pcap"]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      - doh-server

  implant:
    image: ghcr.io/bitsofalber/dark-water-implant:latest
    container_name: ${LAB_ID:-dark-water}-implant
    environment:
      - DOH_HOST=doh-server
      - START_DELAY=${START_DELAY:-6}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/session_done"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      - doh-server
      - sniffer
    networks: [labnet]

networks:
  labnet:
    name: ${LAB_ID:-dark-water}-net
