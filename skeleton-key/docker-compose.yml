# Skeleton Key — decryptable TLS C2 capture runtime (SFRS-compliant).
# 3 servicios: c2server (C2 sobre TLS con key exchange RSA, descifrable), implant
# (beacon) y sniffer. El sniffer comparte el netns del c2server y escribe
# ./pcaps/tls-c2.pcap. La clave privada para descifrar va en resources/decrypt-me.key.
services:
  c2server:
    image: ghcr.io/bitsofalber/skeleton-key-c2server:latest
    container_name: ${LAB_ID:-skeleton-key}-c2server
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost',443),2)\""]
      interval: 4s
      timeout: 3s
      retries: 10
    networks: [labnet]

  sniffer:
    image: ghcr.io/bitsofalber/skeleton-key-sniffer:latest
    container_name: ${LAB_ID:-skeleton-key}-sniffer
    network_mode: "service:c2server"
    volumes:
      - ./pcaps:/pcaps
    healthcheck:
      test: ["CMD-SHELL", "test -f /pcaps/tls-c2.pcap"]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      - c2server

  implant:
    image: ghcr.io/bitsofalber/skeleton-key-implant:latest
    container_name: ${LAB_ID:-skeleton-key}-implant
    environment:
      - C2_HOST=c2server
      - START_DELAY=${START_DELAY:-6}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/session_done"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      - c2server
      - sniffer
    networks: [labnet]

networks:
  labnet:
    name: ${LAB_ID:-skeleton-key}-net
