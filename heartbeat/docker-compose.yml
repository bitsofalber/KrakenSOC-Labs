# Heartbeat — ICMP tunnel exfiltration capture runtime (SFRS-compliant).
# 3 servicios: host (destino de los ping), attacker (exfiltra un fichero por
# payloads ICMP) y sniffer (captura ICMP). El sniffer comparte el netns del host
# y escribe la captura en ./pcaps/icmp-tunnel.pcap.
services:
  host:
    image: ghcr.io/bitsofalber/heartbeat-host:latest
    container_name: ${LAB_ID:-heartbeat}-host
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 4s
      timeout: 3s
      retries: 5
    networks: [labnet]

  sniffer:
    image: ghcr.io/bitsofalber/heartbeat-sniffer:latest
    container_name: ${LAB_ID:-heartbeat}-sniffer
    network_mode: "service:host"
    volumes:
      - ./pcaps:/pcaps
    healthcheck:
      test: ["CMD-SHELL", "test -f /pcaps/icmp-tunnel.pcap"]
      interval: 3s
      timeout: 3s
      retries: 10
    depends_on:
      - host

  attacker:
    image: ghcr.io/bitsofalber/heartbeat-attacker:latest
    container_name: ${LAB_ID:-heartbeat}-attacker
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - TARGET=host
      - START_DELAY=${START_DELAY:-6}
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/session_done"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      - host
      - sniffer
    networks: [labnet]

networks:
  labnet:
    name: ${LAB_ID:-heartbeat}-net
